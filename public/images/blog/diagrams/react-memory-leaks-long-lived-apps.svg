<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#a1a1aa"/>
    </marker>
    <marker id="arrRed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#fb7185"/>
    </marker>
    <marker id="arrGreen" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="760" height="400" rx="14" fill="#0c0c10"/>
  <rect x="0.5" y="0.5" width="759" height="399" rx="14" fill="none" stroke="#2c2c33"/>
  <rect x="28" y="30" width="46" height="5" rx="2.5" fill="#34d399"/>
  <text x="28" y="62" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#fafafa">One leaked listener retains a whole unmounted tree</text>
  <rect x="40" y="110" width="170" height="74" rx="10" fill="#818cf814" stroke="#818cf8" stroke-opacity="0.55"/><text x="125" y="142" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">window</text><text x="125" y="162" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">(GC root)</text>,<rect x="280" y="110" width="190" height="74" rx="10" fill="#fb718514" stroke="#fb7185" stroke-opacity="0.55"/><text x="375" y="134" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">resize listener</text><text x="375" y="154" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">(never removed)</text><text x="375" y="182" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">leaked closure</text>,<rect x="540" y="110" width="180" height="74" rx="10" fill="#fbbf2414" stroke="#fbbf24" stroke-opacity="0.55"/><text x="630" y="142" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">closure scope</text><text x="630" y="162" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">state + props</text>,<rect x="540" y="240" width="180" height="74" rx="10" fill="#fb718514" stroke="#fb7185" stroke-opacity="0.55"/><text x="630" y="264" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">unmounted route</text><text x="630" y="284" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">~6MB retained</text><text x="630" y="312" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">detached DOM</text>,<line x1="210" y1="147" x2="280" y2="147" stroke="#a1a1aa" stroke-width="1.5"  marker-end="url(#arr)"/><text x="245" y="139" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">refs</text>,<line x1="470" y1="147" x2="540" y2="147" stroke="#a1a1aa" stroke-width="1.5"  marker-end="url(#arr)"/><text x="505" y="139" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">captures</text>,<line x1="630" y1="184" x2="630" y2="240" stroke="#fb7185" stroke-width="1.5"  marker-end="url(#arrRed)"/><text x="630" y="204" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#fb7185">retains</text>,<text x="40" y="360" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#a1a1aa">GC can only free what nothing reachable references —</text>,<text x="40" y="380" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#34d399">cleanup functions cut the chain at the listener.</text>
</svg>