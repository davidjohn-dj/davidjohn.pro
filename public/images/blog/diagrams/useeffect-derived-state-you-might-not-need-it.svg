    <marker id="arrGreen" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="760" height="400" rx="14" fill="#0c0c10"/>
  <rect x="0.5" y="0.5" width="759" height="399" rx="14" fill="none" stroke="#2c2c33"/>
  <rect x="28" y="30" width="46" height="5" rx="2.5" fill="#a78bfa"/>
  <text x="28" y="62" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#fafafa">Effect relay race vs. render-time math</text>
  <text x="40" y="105" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#fb7185">before — 5 effects, 11 renders, stale frames between each hop</text>,<rect x="40" y="120" width="110" height="54" rx="10" fill="#63636b14" stroke="#63636b" stroke-opacity="0.55"/><text x="95" y="151" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#fafafa">click</text>,<rect x="180" y="120" width="110" height="54" rx="10" fill="#fbbf2414" stroke="#fbbf24" stroke-opacity="0.55"/><text x="235" y="142" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#fafafa">effect 1</text><text x="235" y="159" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#fafafa">setStores</text>,<rect x="320" y="120" width="110" height="54" rx="10" fill="#fbbf2414" stroke="#fbbf24" stroke-opacity="0.55"/><text x="375" y="142" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#fafafa">effect 2</text><text x="375" y="159" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#fafafa">setValid</text>,<rect x="460" y="120" width="110" height="54" rx="10" fill="#fbbf2414" stroke="#fbbf24" stroke-opacity="0.55"/><text x="515" y="142" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#fafafa">effect 3</text><text x="515" y="159" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#fafafa">setSelect</text>,<rect x="600" y="120" width="110" height="54" rx="10" fill="#fbbf2414" stroke="#fbbf24" stroke-opacity="0.55"/><text x="655" y="142" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#fafafa">effect 4</text><text x="655" y="159" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#fafafa">setQuery</text>,<line x1="150" y1="147" x2="180" y2="147" stroke="#fb7185" stroke-width="1.5"  marker-end="url(#arrRed)"/>,<line x1="290" y1="147" x2="320" y2="147" stroke="#fb7185" stroke-width="1.5"  marker-end="url(#arrRed)"/>,<line x1="430" y1="147" x2="460" y2="147" stroke="#fb7185" stroke-width="1.5"  marker-end="url(#arrRed)"/>,<line x1="570" y1="147" x2="600" y2="147" stroke="#fb7185" stroke-width="1.5"  marker-end="url(#arrRed)"/>,<text x="40" y="218" text-anchor="start" font-family="monospace" font-size="12" font-weight="400" fill="#63636b">render · render · render · render · render …</text>,<text x="40" y="262" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#34d399">after — store intent, derive the rest in render (2 renders)</text>,<rect x="40" y="278" width="150" height="70" rx="10" fill="#818cf814" stroke="#818cf8" stroke-opacity="0.55"/><text x="115" y="308" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#fafafa">state:</text><text x="115" y="326" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#fafafa">selection</text>,<rect x="260" y="278" width="200" height="70" rx="10" fill="#34d39914" stroke="#34d399" stroke-opacity="0.55"/><text x="360" y="308" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#fafafa">derived in render:</text><text x="360" y="326" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#fafafa">validStores, query</text>,<rect x="530" y="278" width="180" height="70" rx="10" fill="#34d39914" stroke="#34d399" stroke-opacity="0.55"/><text x="620" y="308" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#fafafa">every frame</text><text x="620" y="326" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#fafafa">consistent ✅</text>,<line x1="190" y1="313" x2="260" y2="313" stroke="#34d399" stroke-width="1.5"  marker-end="url(#arrGreen)"/><text x="225" y="305" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#34d399">math</text>,<line x1="460" y1="313" x2="530" y2="313" stroke="#34d399" stroke-width="1.5"  marker-end="url(#arrGreen)"/>
</svg>