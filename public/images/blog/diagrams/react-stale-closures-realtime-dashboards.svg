  <rect x="40" y="100" width="180" height="80" rx="10" fill="#63636b14" stroke="#63636b" stroke-opacity="0.55"/><text x="130" y="127" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">Render #1</text><text x="130" y="147" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">threshold = 120</text><text x="130" y="175" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">socket subscribes here</text>,<rect x="40" y="210" width="180" height="80" rx="10" fill="#34d39914" stroke="#34d399" stroke-opacity="0.55"/><text x="130" y="237" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">Render #7</text><text x="130" y="257" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">threshold = 150</text><text x="130" y="285" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">current UI</text>,<rect x="310" y="100" width="190" height="80" rx="10" fill="#fb718514" stroke="#fb7185" stroke-opacity="0.55"/><text x="405" y="127" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">ws.onmessage</text><text x="405" y="147" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">closure</text><text x="405" y="175" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">still reads 120</text>,<rect x="580" y="100" width="140" height="80" rx="10" fill="#fb718514" stroke="#fb7185" stroke-opacity="0.55"/><text x="650" y="135" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">Alert fires</text><text x="650" y="155" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">at 120 ❌</text>,<line x1="220" y1="140" x2="310" y2="140" stroke="#a1a1aa" stroke-width="1.5"  marker-end="url(#arr)"/><text x="265" y="132" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">captured at mount</text>,<line x1="500" y1="140" x2="580" y2="140" stroke="#fb7185" stroke-width="1.5"  marker-end="url(#arrRed)"/>,<rect x="310" y="240" width="190" height="80" rx="10" fill="#34d39914" stroke="#34d399" stroke-opacity="0.55"/><text x="405" y="267" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">thresholdRef</text><text x="405" y="287" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">.current</text><text x="405" y="315" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">updated every render</text>,<line x1="220" y1="260" x2="310" y2="270" stroke="#34d399" stroke-width="1.5"  marker-end="url(#arrGreen)"/><text x="265" y="257" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#34d399">write</text>,<line x1="405" y1="240" x2="405" y2="180" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrGreen)"/><text x="405" y="202" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#34d399">read at event time ✅</text>
