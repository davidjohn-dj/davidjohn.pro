  <text x="28" y="62" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#fafafa">Boundary drift: the directive climbs, the bundle grows</text>
  <rect x="40" y="110" width="200" height="70" rx="10" fill="#fb718514" stroke="#fb7185" stroke-opacity="0.55"/><text x="140" y="132" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">layout.tsx</text><text x="140" y="152" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">&quot;use client&quot; ❌</text><text x="140" y="180" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">everything hydrates</text>,<rect x="40" y="210" width="200" height="70" rx="10" fill="#fbbf2414" stroke="#fbbf24" stroke-opacity="0.55"/><text x="140" y="232" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">section.tsx</text><text x="140" y="252" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">&quot;use client&quot; ⚠️</text><text x="140" y="280" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">whole section ships JS</text>,<rect x="40" y="310" width="200" height="70" rx="10" fill="#34d39914" stroke="#34d399" stroke-opacity="0.55"/><text x="140" y="332" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">toggle.tsx</text><text x="140" y="352" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">&quot;use client&quot; ✅</text><text x="140" y="380" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">20-line leaf</text>,<line x1="140" y1="310" x2="140" y2="280" stroke="#34d399" stroke-width="1.5"  marker-end="url(#arrGreen)"/>,<line x1="140" y1="210" x2="140" y2="180" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrRed)"/><text x="140" y="187" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#fb7185">creep</text>,<rect x="390" y="110" width="330" height="70" rx="10" fill="#fb718514" stroke="#fb7185" stroke-opacity="0.55"/><text x="555" y="142" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">First-load JS: 1.21 MB</text><text x="555" y="170" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">boundary at the root</text>,<rect x="390" y="310" width="330" height="70" rx="10" fill="#34d39914" stroke="#34d399" stroke-opacity="0.55"/><text x="555" y="342" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">First-load JS: 287 KB</text><text x="555" y="370" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">boundary at the leaves</text>,<text x="390" y="240" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#a1a1aa">same features — the only change is</text>,<text x="390" y="260" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#a1a1aa">where the directive sits.</text>
