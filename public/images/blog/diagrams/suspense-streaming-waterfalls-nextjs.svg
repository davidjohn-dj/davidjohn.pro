ans-serif" font-size="12" font-weight="600" fill="#fafafa">shell + skeletons</text><text x="105" y="270.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">TTFB 190ms</text>,<rect x="40" y="292" width="90" height="40" rx="10" fill="#818cf814" stroke="#818cf8" stroke-opacity="0.55"/><text x="85" y="315.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#fafafa">profile</text>,<rect x="40" y="344" width="90" height="40" rx="10" fill="#818cf814" stroke="#818cf8" stroke-opacity="0.55"/><text x="85" y="367.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#fafafa">vehicle</text>,<rect x="150" y="292" width="110" height="40" rx="10" fill="#818cf814" stroke="#818cf8" stroke-opacity="0.55"/><text x="205" y="315.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#fafafa">coverage</text>,<rect x="150" y="344" width="240" height="40" rx="10" fill="#a78bfa14" stroke="#a78bfa" stroke-opacity="0.55"/><text x="270" y="367.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#fafafa">pricing (Suspense)</text>,<line x1="180" y1="250" x2="420" y2="250" stroke="#34d399" stroke-width="1.5"  marker-end="url(#arrGreen)"/><text x="300" y="242" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#34d399">streams as each resolves</text>,<rect x="440" y="292" width="280" height="92" rx="10" fill="#34d39914" stroke="#34d399" stroke-opacity="0.55"/><text x="580" y="325" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">user reads the page</text><text x="580" y="345" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">while pricing arrives</text><text x="580" y="373" text-anchor="mid