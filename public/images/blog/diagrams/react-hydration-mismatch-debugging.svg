  <text x="28" y="62" text-anchor="start" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#fafafa">Hydration: one tree, two renders, one contract</text>
  <rect x="40" y="100" width="200" height="90" rx="10" fill="#818cf814" stroke="#818cf8" stroke-opacity="0.55"/><text x="140" y="132" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">Server render</text><text x="140" y="152" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">(UTC, 2am)</text><text x="140" y="180" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">&quot;Sunday&quot; in HTML</text>,<rect x="40" y="240" width="200" height="90" rx="10" fill="#f472b614" stroke="#f472b6" stroke-opacity="0.55"/><text x="140" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">Client render</text><text x="140" y="292" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">(Sydney, 8am)</text><text x="140" y="320" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">&quot;Monday&quot; expected</text>,<rect x="310" y="165" width="170" height="100" rx="10" fill="#a78bfa14" stroke="#a78bfa" stroke-opacity="0.55"/><text x="395" y="210" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">hydrateRoot</text><text x="395" y="230" text-anchor="middle" font-family="monospace" font-size="15" font-weight="600" fill="#fafafa">compares trees</text>,<line x1="240" y1="145" x2="310" y2="195" stroke="#a1a1aa" stroke-width="1.5"  marker-end="url(#arr)"/><text x="275" y="162" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">HTML</text>,<line x1="240" y1="285" x2="310" y2="235" stroke="#a1a1aa" stroke-width="1.5"  marker-end="url(#arr)"/><text x="275" y="252" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">component tree</text>,<rect x="550" y="100" width="170" height="90" rx="10" fill="#34d39914" stroke="#34d399" stroke-opacity="0.55"/><text x="635" y="132" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">Match</text><text x="635" y="152" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">attach listeners</text><text x="635" y="180" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">fast, no flash</text>,<rect x="550" y="240" width="170" height="90" rx="10" fill="#fb718514" stroke="#fb7185" stroke-opacity="0.55"/><text x="635" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">Mismatch</text><text x="635" y="292" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#fafafa">discard + re-render</text><text x="635" y="320" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a1a1aa">flash, double work</text>,<line x1="480" y1="190" x2="550" y2="150" stroke="#34d399" stroke-width="1.5"  marker-end="url(#arrGreen)"/>,<line x1="480" y1="240" x2="550" y2="280" stroke="#fb7185" stroke-width="1.5"  marker-end="url(#arrRed)"/>
